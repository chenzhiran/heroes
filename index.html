<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCombat英雄图鉴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

:root{
  --gold:#f4c752;
  --gold-bright:#ffe089;
  --gold-dark:#9c7a2a;
  --ink:#0c0a08;
  --panel:rgba(18,14,10,0.72);
  --line:rgba(244,199,82,0.28);
  --text:#ece4d6;
  --dim:#9c9083;
  --red:#e8584f;
  --green:#5fc97a;
  --blue:#6aa5ff;
  --purple:#b78bff;
  --cyan:#56d4d4;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:#000;color:var(--text);overflow:hidden;}

.bg-stage{position:fixed;inset:0;z-index:0;overflow:hidden;background:#0a0806;}
.bg-img{
  position:absolute;top:0;right:0;height:100%;width:auto;min-width:75%;
  object-fit:cover;object-position:right center;
  opacity:0;
  transform:translateX(40px) scale(1.06);
  transition:opacity .7s ease, transform .7s cubic-bezier(.22,.61,.36,1);
}
.bg-img.show{opacity:1;transform:translateX(0) scale(1.04);}
.bg-veil{position:absolute;inset:0;z-index:1;
  background:
    linear-gradient(90deg, rgba(8,6,4,0.97) 0%, rgba(8,6,4,0.85) 28%, rgba(8,6,4,0.35) 52%, rgba(8,6,4,0.05) 75%),
    linear-gradient(0deg, rgba(8,6,4,0.85) 0%, rgba(8,6,4,0) 35%);
}
.hero-poster{position:fixed;top:0;right:0;height:100vh;z-index:2;
  display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none;overflow:hidden;}
.hero-poster img{
  height:100vh;width:auto;object-fit:contain;object-position:bottom right;
  filter:drop-shadow(-25px 25px 45px rgba(0,0,0,0.7));
  opacity:0;
  transform:translateX(-40px) scale(1.02);
  transition:opacity .7s ease, transform .7s cubic-bezier(.22,.61,.36,1);
  animation:breathe 5.5s ease-in-out infinite;
}
.hero-poster img.show{opacity:1;transform:translateX(0) scale(1);}
@keyframes breathe{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-14px) scale(1.018);}
}

.topbar{position:fixed;top:0;left:0;right:0;height:64px;z-index:30;
  display:flex;align-items:center;padding:0 38px;
  background:linear-gradient(180deg,rgba(6,4,2,0.92),rgba(6,4,2,0));}
.brand{display:flex;align-items:center;gap:14px;}
.brand-logo{height:34px;width:auto;display:block;cursor:pointer;
  filter:drop-shadow(0 2px 8px #000);transition:transform .25s ease;}
.brand-logo:hover{transform:scale(1.05);}
.brand small{color:var(--dim);font-family:'Noto Sans SC';font-weight:400;font-size:13px;letter-spacing:1px;}

.hero-rail{position:fixed;top:64px;bottom:0;left:0;width:118px;z-index:25;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:18px 0 40px;overflow-y:auto;overflow-x:hidden;
  background:linear-gradient(90deg,rgba(8,6,4,0.78),rgba(8,6,4,0.15));
  border-right:1px solid var(--line);
  scrollbar-width:thin;scrollbar-color:var(--gold-dark) transparent;}
.hero-rail::-webkit-scrollbar{width:6px;}
.hero-rail::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px;}
.hero-rail::-webkit-scrollbar-track{background:transparent;}
.rail-hint{font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}

.avatar{width:74px;height:74px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background-size:cover;background-position:center;
  border:2px solid rgba(120,108,90,0.5);
  filter:grayscale(0.55) brightness(0.72);
  transition:all .3s ease;position:relative;}
.avatar:hover{filter:grayscale(0) brightness(1);transform:scale(1.06);border-color:#c9b682;}
.avatar.active{filter:grayscale(0) brightness(1.05);border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(244,199,82,0.25),0 0 18px rgba(244,199,82,0.55);transform:scale(1.08);}
.avatar.active::after{content:'';position:absolute;left:-13px;top:50%;transform:translateY(-50%);
  width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:8px solid var(--gold);}

.info{position:fixed;top:64px;left:118px;z-index:20;
  width:430px;max-width:42vw;padding:46px 34px 30px 40px;
  display:flex;flex-direction:column;height:calc(100vh - 64px);}
.info-anim{opacity:0;transform:translateY(18px);transition:all .6s ease;}
.info-anim.in{opacity:1;transform:translateY(0);}

.h-cn{font-family:'Cinzel',serif;font-weight:800;font-size:14px;letter-spacing:6px;
  color:var(--gold);margin-bottom:6px;}
.h-name{font-size:50px;font-weight:900;line-height:1.05;
  background:linear-gradient(180deg,#fff7e2,#f4c752 60%,#bd902e);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 3px 10px rgba(0,0,0,0.6));}
.h-divider{width:64px;height:3px;margin:18px 0;
  background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px;}
.h-slogan{font-size:16px;line-height:1.9;color:var(--text);font-weight:500;
  text-shadow:0 2px 6px #000;max-width:360px;
  border-left:3px solid var(--gold);padding-left:16px;}

.radar-box{margin-top:30px;display:flex;align-items:center;gap:18px;}
.radar-wrap{position:relative;width:200px;height:200px;flex-shrink:0;}
.radar-wrap svg{width:100%;height:100%;overflow:visible;}
.radar-label{font-size:11px;fill:var(--dim);font-weight:700;}
.legend{display:flex;flex-direction:column;gap:9px;font-size:13px;}
.legend div{display:flex;justify-content:space-between;gap:14px;color:var(--dim);min-width:120px;}
.legend b{color:var(--text);font-weight:700;}

.story-btn{margin-top:auto;align-self:flex-start;
  display:inline-flex;align-items:center;gap:10px;cursor:pointer;
  padding:12px 26px;border:1px solid var(--gold);border-radius:30px;
  background:rgba(244,199,82,0.08);color:var(--gold);font-size:14px;font-weight:700;letter-spacing:2px;
  transition:all .25s ease;backdrop-filter:blur(4px);}
.story-btn:hover{background:var(--gold);color:#1a1208;box-shadow:0 0 20px rgba(244,199,82,0.5);}
.story-btn svg{width:16px;height:16px;}

.story-mask{position:fixed;inset:0;z-index:50;background:rgba(2,2,2,0.55);
  backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .4s ease;}
.story-mask.open{opacity:1;pointer-events:auto;}
.story-panel{position:fixed;top:0;right:0;bottom:0;z-index:51;width:640px;max-width:92vw;
  background:linear-gradient(180deg,#15110b,#0c0907);
  border-left:2px solid var(--gold-dark);
  box-shadow:-30px 0 80px rgba(0,0,0,0.7);
  transform:translateX(100%);transition:transform .5s cubic-bezier(.22,.61,.36,1);
  display:flex;flex-direction:column;}
.story-panel.open{transform:translateX(0);}
.story-head{padding:34px 48px 22px;border-bottom:1px solid var(--line);position:relative;}
.story-head .s-cn{font-family:'Cinzel',serif;color:var(--gold);letter-spacing:5px;font-size:13px;}
.story-head .s-name{font-size:34px;font-weight:900;color:#fff;margin-top:4px;}
.story-head .s-nick{font-size:15px;color:var(--dim);margin-top:6px;}
.story-close{position:absolute;top:30px;right:40px;width:38px;height:38px;border-radius:50%;
  border:1px solid var(--line);background:transparent;color:var(--gold);font-size:20px;cursor:pointer;
  transition:all .2s;}
.story-close:hover{background:var(--gold);color:#1a1208;border-color:var(--gold);}
.story-body{padding:30px 48px 60px;overflow-y:auto;line-height:2.1;font-size:15.5px;
  color:#d8d0c2;text-align:justify;scrollbar-width:thin;scrollbar-color:var(--gold-dark) transparent;}
.story-body::-webkit-scrollbar{width:8px;}
.story-body::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:4px;}
.story-body p{margin-bottom:24px;}
.story-body .callout{border-left:4px solid var(--gold);background:rgba(244,199,82,0.07);
  padding:20px 24px;margin:30px 0;font-style:italic;font-size:16px;color:#fff;border-radius:0 8px 8px 0;}
.hl-gold{color:var(--gold);font-weight:700;}
.hl-cyan{color:var(--cyan);font-weight:700;}
.hl-red{color:#ef8b86;font-weight:700;}

.counter{position:fixed;bottom:24px;left:138px;z-index:22;font-family:'Cinzel',serif;
  font-size:13px;color:var(--dim);letter-spacing:2px;}
.counter b{color:var(--gold);font-size:22px;}

@media (max-width:900px){
  .info{width:auto;right:14px;max-width:none;padding:30px 18px 20px 24px;}
  .h-name{font-size:36px;} .h-slogan{font-size:14px;}
  .radar-box{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<div class="bg-stage">
  <img id="bgImg" class="bg-img" alt="">
  <div class="bg-veil"></div>
</div>
<div class="hero-poster"><img id="posterImg" alt=""></div>

<div class="topbar">
  <div class="brand">
    <a href="https://codecombat.cn/home" target="_blank" rel="noopener">
      <img class="brand-logo" src="https://assets.koudashijie.com/world/logo.webp" alt="CodeCombat">
    </a>
    <small>英雄图鉴</small>
  </div>
</div>

<aside class="hero-rail" id="rail">
  <div class="rail-hint">滑动浏览</div>
</aside>

<section class="info">
  <div class="info-anim" id="infoAnim">
    <div class="h-cn" id="hCn"></div>
    <div class="h-name" id="hName"></div>
    <div class="h-divider"></div>
    <div class="h-slogan" id="hSlogan"></div>

    <div class="radar-box">
      <div class="radar-wrap"><svg id="radar" viewBox="-100 -100 200 200"></svg></div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <button class="story-btn" id="openStory">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    阅读英雄故事
  </button>
</section>

<div class="counter"><b id="cNow">01</b> / <span id="cAll">21</span></div>

<div class="story-mask" id="storyMask"></div>
<div class="story-panel" id="storyPanel">
  <div class="story-head">
    <div class="s-cn">HERO STORY</div>
    <div class="s-name" id="sName"></div>
    <div class="s-nick" id="sNick"></div>
    <button class="story-close" id="closeStory">&times;</button>
  </div>
  <div class="story-body" id="sBody"></div>
</div>

<script>
/* ===== 英雄数据 =====
   title=中文称号；atk攻击/hp生命/spd速度/def防御/skl技能（0-100） */
const heroes = [
{f:"anya",cn:"安雅",title:"红发队长",nick:"安雅（红发队长）",map:"边际森林",
 desc:"安雅队长从不端架子，无论是带兵冲锋、砸食人魔基地，还是捡颗亮晶晶的宝石，她都乐意冲在最前面。",
 atk:75,hp:95,spd:30,def:80,skl:45,
 lore:`<p>没有人记得安雅是从哪一年开始守在<span class="hl-gold">边际森林</span>边境的。老兵们只记得，每个最难熬的寒冬，那头红发都会准时出现在林缘的城墙上——像一簇不肯熄灭的火，告诉所有人：天还没塌。</p>
 <p>她出身在森林边缘一座靠打铁过活的小镇，父亲的铁砧声是她童年全部的背景音。十五岁那年，邻家的孩子被食人魔掳进了林子深处的营地，大人们围在火堆边唉声叹气、谁也不敢动，是她抄起一把没开刃的旧剑独自冲进了那片密林。孩子被她背了出来，她的右眼却永远留在了那片<span class="hl-red">恶咒的烟尘</span>里——从此她习惯了用一只眼睛<span class="hl-cyan">看得最远</span>。她从不觉得那是损失。“我用一只眼睛，换回了一个还能长大的人，这买卖划算得很。”</p>
 <div class="callout">“只要阿雅姐还站着，我们的身后就是家园；只要她的剑还举着，恐惧便无处遁形。”</div>
 <p>当上队长后，她依旧不端半点架子。冲锋时她在最前，撤退时她在最后，分粮时她的那份永远是最小的。新兵第一次跟她踏进边际森林并肩作战，往往会被她那股不要命的劲头吓到，可几场仗打下来，所有人都明白了——她拼命，是为了让身后的人不必拼命。</p>
 <p>这个在战场上横冲直撞的女人，私底下却有个柔软得近乎孩子气的习惯：她痴迷于收集一切<span class="hl-gold">闪闪发亮的小东西</span>。一枚磨花的铜币、一颗被林间溪水冲圆的彩石、废墟余烬里半透明的琉璃碎片，她都仔细收进披风内袋。有士兵笑她捡破烂，她却把那些碎光摊在掌心，认真地说：“这世道太灰了，灰扑扑的日子过久了，人会忘记光长什么样。所以我得替大家记着——你看，光从来没走远。”那一刻所有人都懂了，她捡的哪里是石头，是她想为每个人留住的、活下去的理由。</p>`},

{f:"tharin",cn:"塔林",title:"金甲战士",nick:"塔林（金甲战士）",map:"流金沙漠",
 desc:"金甲之下是三个改不掉的热爱：探地图、盖哨塔、正面硬刚——慢是慢了点，但盾墙从不后退。",
 atk:85,hp:92,spd:25,def:95,skl:40,
 lore:`<p>人们看见塔林的第一眼，往往会被那身在<span class="hl-gold">流金沙漠</span>烈日下熠熠生辉的黄金铠甲晃了神。可只要相处过一阵，就会发现真正耀眼的从来不是金属，而是甲胄里那个慢条斯理、却从不食言的男人。他便是<span class="hl-cyan">塔林·雷霆拳</span>，后辈们敬畏地唤他<span class="hl-gold">“金甲战士”</span>。</p>
 <p>他出身古老的工匠世家。祖父临终前握着他的手说：“真正的好金属，不光要扛得住火，还要扛得住别人把命压在它身上。”塔林把这句话打进了自己的骨头里。他这一生有三件改不掉的爱好——铺开地图探索流金沙漠那些无人踏足的疆土，在滚烫的黄沙里一砖一瓦地盖起哨塔，以及，正面迎上任何敢扑向他身后之人的敌人。</p>
 <div class="callout">“真正的强大，不是摧毁，而是建设；真正的辉煌，不是盔甲的颜色，而是那颗永不熄灭的、赤诚的守护之心。”</div>
 <p>他确实慢。行军慢、出剑慢、连说话都要想上半天。年轻气盛的新兵起初瞧不上这份迟钝，直到有一回沙漠里敌潮如沙暴般倾来，所有人都开始后撤，唯有塔林像一堵金色的墙，一步没退。巨剑落下时连脚下的沙丘都在颤，他身后那条本该崩溃的防线，竟硬是被他一个人钉住了。那天起，再没人敢笑他慢——他们终于明白，他的慢里藏着不肯放弃任何人的执拗。</p>
 <p>战事平息的日子，他便脱不下那身甲，扛着石块在流金沙漠的烈日下为流民盖屋。汗水顺着金甲流成小河，他却乐在其中。有人问他这般辛苦图什么，他抹一把脸笑道：“盖一座塔，能让一户人在这片荒沙里睡个安稳觉；这比砍倒一百个敌人，让我心里踏实多了。”这便是塔林——他用金甲挡住刀剑，却用一双手，为这个破碎的世界一点点重新砌起家的模样。</p>`},

{f:"ida",cn:"艾达",title:"白袍女爵",nick:"艾达（白袍女爵）",map:"边际森林",
 desc:"白袍女爵在法庭上敲槌子，下了庭却没人知道她是去喝下午茶，还是单挑食人魔窝点。",
 atk:80,hp:85,spd:35,def:78,skl:55,
 lore:`<p>在<span class="hl-gold">边际森林</span>边缘那座小镇的法庭上，<span class="hl-cyan">艾达·正心女爵</span>是最令人敬畏的那道白影。她敲下的每一槌都干脆利落，眼神锐利得能看穿谎言的缝隙。人们背地里唤她<span class="hl-gold">“白袍天平”</span>——因为在她手里，权势与贫贱从不影响刻度的偏移。</p>
 <p>她出身法官世家，自幼在堆积如山的古老法典里长大。可比起那些冰冷的条文，她更早学会的是另一件事：公理若只活在书页里，便救不了任何一个在寒夜里挨饿的人。于是她脱下贵族的华服，换上绣着红纹的白袍，腰悬长剑，亲自走进边际森林深处的村落与乡野，去替那些连状纸都不会写的人讨一个说法。</p>
 <div class="callout">“正义不应只有严寒的威慑，更应有春风般的抚慰。”</div>
 <p>所以她有了两副面孔，也成了边际森林最大的谜。白日里，她是不徇私情的裁决者，一袭白袍翻飞间，连最嚣张的恶徒也会噤声。可一旦暮色落下，没人知道这位女爵去了哪里。有传言说她去喝下午茶，也有传言说她独自摸进了森林深处食人魔的窝点。两种说法听起来风马牛不相及，偏偏都有人信誓旦旦地说亲眼见过。</p>
 <p>真相或许藏在那些零碎的目击里：一个孩子说，深夜林间的溪边，那位白日威风凛凛的大人正蹲在水边，用绷带一圈圈温柔地缠着一只断翅的山雀；一个老木匠说，他漏雨的屋顶不知被谁悄悄补上了最后一片瓦，那人走时只在林荫里留下一道白色的背影。艾达从不解释自己去了哪里。她只是相信，正义需要长剑去劈开黑暗，却更需要一颗肯在无人处弯下腰的心，去把那点被劈出来的光，一寸寸缝回人间。</p>`},

{f:"alejandro",cn:"阿莱",title:"红衫客",nick:"阿莱（红衫客）",map:"流金沙漠",
 desc:"阿莱扛着巨剑走遍四方，小盾一竖来者不拒——输赢无所谓，能检验身手就是好对手。",
 atk:88,hp:80,spd:40,def:60,skl:50,
 lore:`<p>从<span class="hl-gold">流金沙漠</span>无尽的黄沙，到落叶纷飞的深林，总有一抹鲜红在路上。那是<span class="hl-cyan">阿莱</span>，背着比他半个身子还高的巨剑，左臂挂着一面小盾，逢人便笑着问一句：“要不要,切磋一下？”行者们叫他<span class="hl-gold">“红衫客”</span>。</p>
 <p>他不为财、不为名、不为地盘。他只为一件事而活——印证。印证自己的剑究竟能走多远，印证这世上还有没有让他全力以赴也未必能赢的对手。这种近乎纯粹的执着，让他活成了一个行走在红尘里的剑道苦行僧，而广袤的流金沙漠，正是他最爱的修行场——那里有最强悍的游侠、最孤高的剑客，也有最公平的、不被任何人打扰的对决之地。</p>
 <div class="callout">“剑锋的高低，不在于击败了多少弱者，而在于能否在面对强者时，看清真实的自我。”</div>
 <p>他出剑并不快，反而沉稳厚重，带着“重剑无锋，大巧不工”的拙朴。右手的<span class="hl-red">巨剑</span>是他的理想，左手的小盾是他的底线——他常说，连自己都护不住的人，没资格谈什么追求。所以无论对手多强，他从不蛮干，一守一攻之间，自有他参透了千百场决斗才悟出的章法。</p>
 <p>关于他，旅人间流传着一段往事：他曾在流金沙漠的一处绿洲遇上一位旗鼓相当的剑客，对方却在赴约前受了重伤。换作旁人,这是天赐的取胜良机，阿莱却足足等了三个月。他不收分文，每日为对手在沙漠边缘打猎、采药疗伤，只为等一场堂堂正正的对决。等伤好了，两人在漫天黄沙里战了整整一天一夜，最后他赢得险之又险。决斗结束，他收剑入鞘，朝对手郑重一抱拳，转身又走向沙海深处下一段未知的路。对阿莱而言，输赢从来不是终点——能遇上一个让他看清自己几斤几两的对手，本身就是这场漫长决斗最好的奖赏。</p>`},

{f:"amara",cn:"阿玛拉",title:"冷羽射手",nick:"阿玛拉(冷羽射手)",map:"暗影地牢",
 desc:"阿玛拉的箭比食人魔的心跳还快，但要是被近了身，她那身皮甲连声“咔嚓”都撑不住。",
 atk:70,hp:55,spd:90,def:25,skl:60,
 lore:`<p>老猎人教训徒弟时总爱说一句话：“在<span class="hl-gold">暗影地牢</span>那种伸手不见五指的地方，要是你后颈忽然窜过一阵凉，别回头——那不是风，是<span class="hl-cyan">阿玛拉</span>已经盯上你了。”人们叫她<span class="hl-gold">“冷羽”</span>，这名字简单得像一次呼吸，却也致命得像一记弦响。</p>
 <p>她来自一个信奉“隐匿即生存”的游牧部族。族里的孩子从小就要学会让自己消失——让心跳慢下来，慢到连最警觉的猎物也察觉不到一双眼睛正在暗处丈量它的死亡。阿玛拉是其中最出色的那一个，也正因如此，她成了少数敢独闯暗影地牢的人。那身轻甲薄得几乎没有重量，给了她鬼魅般的速度，却也意味着<span class="hl-red">一旦在那狭窄的地牢里被近了身，连声“咔嚓”都撑不住</span>。于是她把全部的命，都压在了“先敌一步”这四个字上。</p>
 <div class="callout">“只要给‘冷羽’一角容身之暗，她就能拿下这世上跑得最快的怪物。”</div>
 <p>最为人称道的是那次潜入暗影地牢的伏击。一队以迅捷著称的食人魔精锐正借着地牢的黑暗集结，妄图从地底奔袭地面疲惫的村庄。可它们没料到，黑暗的甬道里早有一枚“钉子”静静扎了进去。阿玛拉没有现身，没有呐喊，她只是等——等火把噼啪的那一刹那，扣下了弩机。庞然大物在狂奔中接连栽倒，闷响一声接着一声，直到地牢重归死寂。地面村庄里的人睡了一整夜安稳觉，没有一个人知道，那晚地底究竟发生过什么。</p>
 <p>她看上去孤冷疏离，总刻意和人保持着一臂之外的距离。可只有并肩战过的人才知道，每次深入地牢前，侧翼暗处的哨卡总会被人悄无声息地清理干净，从来没人看见是谁干的。安雅在前头开路，塔林在中央死守，而她，是那道护在所有人身后、谁也看不见的<span class="hl-cyan">影子</span>。她比谁都清楚自己有多脆弱——正因如此，她才比谁都警觉。她用一张弓在黑暗中划出生与死的界线：线内是她拼命护住的安宁，线外的危险，还没靠近，就已经倒下了。</p>`},

{f:"hushbaum",cn:"贺舒曼",title:"镜中先知",nick:"贺舒曼（镜中先知）",map:"暗影地牢",
 desc:"贺舒曼把学院课本扔进火堆后，才真正学会了用杖尖改写物理法则——现实？不过是一面等她敲碎的镜子。",
 atk:55,hp:45,spd:40,def:35,skl:95,
 lore:`<p>奥法学院的老教授至今还会提起那个学生：天赋绝顶，却在某个深夜，把自己抄了七年的课本一本本投进了火堆。火光映着她平静的脸，她说：“这些公式教会我世界是怎样的，却没教我，当世界错了的时候，该怎么把它扳回来。”她便是<span class="hl-cyan">贺舒曼</span>，后辈们唤她<span class="hl-gold">“贺老师”</span>。</p>
 <p>她曾是学院最虔诚的信徒，相信万物皆可被公式拆解。可当她追着一线古老的魔力波动，第一次踏进<span class="hl-gold">暗影地牢</span>那扭曲了一切法则的深处时，她亲眼看着那些精密优美的规律，在赤裸裸的黑暗与暴力面前像纸一样碎掉。那一刻她忽然懂了：知识若不能用来护人，便只是漂亮的废墟。于是她披上火红的法袍走入红尘，从此那副圆框眼镜后的目光，不再用来仰望星辰，而是用来盯紧每一个需要她的人。</p>
 <div class="callout">“真正的力量，从来不是为了毁灭，而是为了在混沌之中，强行为众生开辟出一道名为‘秩序’的坦途。”</div>
 <p>战场上的她有一种近乎可怕的镇定。最乱的时候，她总会抬手，用指尖轻轻抵一下镜架——这个小动作，往往是奇迹的前奏。她的动作甚至显得迟缓，因为她的心神正穿行在常人看不见的维度里。在她指间，坚实的现实软得像绸缎，可以被揉皱、拉长、折叠。扑来的敌人会愕然发现，脚下平地裂成深渊，射向战友的利箭竟在半空划出一道荒谬的弧线，擦着肩膀飞了过去。</p>
 <p>真正让她脱胎换骨的，正是暗影地牢深处那一仗。年轻的士兵中了地牢里弥漫的幻术，神志错乱，竟开始自相残杀。贺舒曼没有念一句攻击咒语，她只是站到混乱的正中央，用几乎要把自己撕裂的意志力，硬生生“校准”了那片被黑暗扭曲的空间，让虚假在真实面前一寸寸融化。那天之后她明白了：对她而言，<span class="hl-cyan">法杖</span>最该做的，不是推演宇宙的奥秘，而是把这面被打碎的世界之镜，一块一块，重新拼回原来的样子。</p>`},

{f:"hattori",cn:"服部半藏",title:"赤影武士",nick:"服部半藏（赤影武士）",map:"暗影地牢",
 desc:"赤影闪过，重甲裂开——服部半藏的刀从不讲理，只讲效率，斩完敌人还不忘收刀行礼。",
 atk:95,hp:60,spd:85,def:40,skl:70,
 lore:`<p>东方云海的彼端，有一片落樱与刀剑交织的土地。<span class="hl-cyan">服部半藏</span>便是从那里走出的武士，伙伴们叫他<span class="hl-gold">“阿藏”</span>，敌人在临死前听见的，则是“赤影”二字。</p>
 <p>他出身严守律法的武士世家，少年时在寒冬的瀑布下站到失去知觉，只为磨砺一颗不动的心。对他而言，刀从不是杀人的铁器，而是意志的延长。他曾是领主麾下最锋利的一柄刀，直到亲眼看见战争如何把无辜的村庄碾成齑粉。那一刻他做了一个决定：背离权贵，做一名流浪的护卫，把这身令人胆寒的速度，用来护住那些连刀都握不稳的人。</p>
 <div class="callout">“动若惊鸿，静若处子。强大的力量不是为了征服，而是为了在黑暗来临时，成为那道最快划破夜空的晨曦。”</div>
 <p>他的刀“不讲理，只讲效率”。这份效率在<span class="hl-gold">暗影地牢</span>那种狭窄昏暗的甬道里，被发挥到了极致。面对披挂重铠、看似无懈可击的强敌，旁人绝望，他却微微一笑——再厚的甲也有缝，再密的防也有隙。当地牢里的敌人借着昏暗刚刚举起巨斧，他早已化作一抹残红，从那道致命的缝隙里穿了过去。重甲裂开的脆响在石壁间回荡时，他已收刀，朝倒下的对手郑重一礼。在他心里，纵是敌人，也值得一份属于武士的体面。</p>
 <p>他沉默寡言，面容总是冷峻，可那身冷硬的甲胄下，跳着一颗最重情义的心。他与塔林是天生的搭档——塔林是那面永不倒下的盾，他便是随时会从盾后激射而出的尖刀。有一回在暗影地牢深处，为了给受困的医疗队多争取一点撤退的时间，他独自堵在狭窄的隘口里来回冲杀，身形快得连残影都泛着血色，直到最后一名伤员被抬出地牢，他才缓缓收刀入鞘。那道在黑暗里往返奔突的赤影，是这世上最锋利的刀，也是最温柔的守护。</p>`},

{f:"senick",cn:"塞尼克",title:"铁牙狂徒",nick:"塞尼克（铁牙狂徒）",map:"流金沙漠",
 desc:"塞尼克的字典里没有“防御”二字，他的陷阱和利爪就是最好的盾牌——尽管谁都没见过他举盾。",
 atk:85,hp:65,spd:45,def:30,skl:65,
 lore:`<p>在<span class="hl-gold">流金沙漠</span>烈日炙烤的废铁与黄沙之间，常有一个赤裸上身、肩披钢甲的身影游荡。他从不躲，从不退，只是直勾勾地盯着猎物，眼里跳着比沙漠骄阳还烫的火。他是<span class="hl-cyan">塞尼克·钢爪</span>，人称<span class="hl-gold">“铁牙”</span>，又叫<span class="hl-red">“猎命狂徒”</span>。</p>
 <p>他来自流金沙漠边缘一片叫“碎骨荒原”的法外之地。在那里，举盾防御被当作懦夫的标记，唯有进攻、进攻、再进攻，才配在烈日与风沙中活下去。他肩上那对锯齿钢爪不是用来挡的，是用来撕的。他几乎从不披重甲，宁可用赤裸的血肉去迎刀锋——这种近乎疯狂的自信，源自他对自己生命力的绝对信任。他的字典里，确实没有“防御”二字。</p>
 <div class="callout">“当你的拳头足够快、力量足够重，死神便追不上你的脚步。”</div>
 <p>所有人都以为他是台没有心的杀戮机器，直到沙漠里那场罕见的暴雪。那时他还是只独来独往的孤狼，却在一片被流沙半掩的废墟里撞见一只奄奄一息的小兽。鬼使神差地，那双沾满血的手没有了结它，反而笨拙地去寻草、捣药、生火。他在风雪里守了整整三夜，看着那点微弱的呼吸一点点重新有力起来。也是那三夜，他第一次明白：真正的强者，不只要有夺走生命的力量，更要有把生命从死亡手里抢回来的本事。</p>
 <p>从此他变了，又好像没变。他依旧孤傲、依旧凶悍、依旧从不举盾。可在流金沙漠最惨烈的厮杀中，他总能凭着一身骇人的<span class="hl-cyan">生命韧性</span>自我修复，甚至在伙伴命悬一线时，伸出那双粗糙的手拉一把。塞尼克·钢爪，他用赤裸的胸膛迎接所有风暴，用钢铁的獠牙撕开黑暗——他是这乱世里最纯粹的掠食者，也是最不肯承认自己心软的守护者。</p>`},

{f:"omarn",cn:"欧曼",title:"药剂大师",nick:"欧曼（药剂大师）",map:"流金沙漠",
 desc:"欧曼的魔杖滴着不稳定的药水，他说魔法就该像学徒时期的恶作剧一样让人猝不及防——毕竟他曾是贺舒曼的师弟。",
 atk:55,hp:65,spd:75,def:35,skl:80,
 lore:`<p><span class="hl-gold">流金沙漠</span>里一座背风的炼金工坊深处，总飘着一股怪味——草木的清香裹着硫磺的焦灼。循味而去，往往能看见一个黑发垂肩的青年，从烟雾里走出来，嘴角挂着一抹轻佻又自信的笑。他是<span class="hl-cyan">欧曼·石酿</span>，战友们叫他<span class="hl-gold">“阿曼”</span>。</p>
 <p>他出自奥法学院，是当年最让导师头疼、也最有灵气的炼金学徒——他还是<span class="hl-gold">贺舒曼的师弟</span>。别的学子在死记硬背正统咒语时，他偏一头扎进被斥为“偏门”的黑帽魔法里。后来他索性把工坊搬到了流金沙漠，因为这里有最罕见的矿物与最炽烈的火源。无数个不眠之夜，他在烟雾缭绕的沙漠工坊里学会了与草木、矿石甚至灵魂的残片对话，硬是把自己熬成了名动一方的药剂大师。</p>
 <div class="callout">“哪怕是碎裂的石子，只要经过赤诚的淬炼，也能酿出改变命运的琼浆。”</div>
 <p>他打仗从不靠蛮力，举手投足间反倒透着几分优雅。他坚信世上没有绝对的毒，也没有绝对的药，全看“平衡”二字。左手一瓶生机盎然的翡翠萃取液，右手一瓶翻涌着<span class="hl-red">暗紫硝烟</span>的怪东西，他的战斗更像一场精密的化学博弈。他说魔法就该像学徒时期的恶作剧——在你最想不到的时候，砸到你脸上。</p>
 <p>这副玩世不恭的样子，是从一次差点要了他命的“试药”里淬出来的。当年为了配出能抵御沙漠中某种未知诅咒的药引，他拿自己当了药引，在生死线上走了一遭。那一遭让他看透了不少世事，自此对生死也多了一份举重若轻的从容。他常自嘲只是个“卖药的”，可每一场恶战结束，他总会默默走到伤员身边，递上一瓶温热的恢复药剂，什么也不多说。他与师姐贺舒曼是一对妙极的搭档：一个在明处用理性架起秩序的骨架，一个在暗处用偏门的药理，悄悄替这世界留住一线生机。</p>`},

{f:"gordon",cn:"戈登",title:"蓝甲卫士",nick:"戈登（蓝甲卫士）",map:"安息云峰",
 desc:"戈登的蓝甲是平民的靠山，他的重锤是冷笑话的克星——谁在他面前玩谐音梗，谁就等着被砸进地里。",
 atk:85,hp:95,spd:20,def:92,skl:38,
 lore:`<p>暮色四合时，<span class="hl-gold">安息云峰</span>通往山下的关隘口总立着一座“山”——深蓝色的重甲一动不动，稳得让人心安。他是<span class="hl-cyan">戈登</span>，平民唤他<span class="hl-gold">“阿戈”</span>，也叫他<span class="hl-gold">“静默的蓝岩”</span>。</p>
 <p>他出生在安息云峰半山一个盛产坚石的部族，长辈从小告诉他：男人的脊梁要比山岩更硬，许下的承诺要比云峰更重。这话他记了一辈子。那身湛蓝如天的重甲从不是为了威风，而是为了给躲在他身后发抖的平民，一面绝不会塌的墙。护住弱者，对他而言不是选择，是刻进骨头里的本能。</p>
 <div class="callout">“言不信者，行不果。”</div>
 <p>他严肃得近乎古板，尤其受不了那些轻飘飘的<span class="hl-red">谐音梗和冷笑话</span>。在他看来，话该像重锤砸石，字字铿锵，而不是绕来绕去的文字游戏。于是守山的队伍里有了个让人哭笑不得的规矩：谁要在备战的紧要关头抖机灵讲冷笑话，戈登便会缓缓举起那柄重得吓人的<span class="hl-red">巨锤</span>，给他来一记“物理上的肃静”。久而久之，大家学会了在他面前好好说话——倒不是怕锤子，是怕辜负了他那份对“认真”的较真。</p>
 <p>他最让人安心的样子，出现在防线将破的绝境里。安息云峰那场著名的“断桥守卫战”，敌军黑压压地涌上山道，连接两座峰峦的唯一通道口只剩戈登一人。他没喊一句豪言壮语，只是沉默地抡起那柄连壮汉都挪不动的巨锤，一下、又一下，硬是在那座云端的断桥上钉下了“不可逾越”四个看不见的大字。天亮时桥还在，他也还站着。可就是这么个铁面汉子，会为补好山民老妇人漏雨的屋顶而放下令人生畏的重锤，会在深夜巡山时,默默替缩在崖壁角落的流浪猫挡一阵风雪。戈登从不用漂亮话表达什么，他只是用那永远挺直的脊梁告诉世人：所谓守护，就是说到,然后,做到。</p>`},

{f:"naria",cn:"娜莉亚",title:"翠羽射手",nick:"娜莉亚（翠羽射手）",map:"边际森林",
 desc:"娜莉亚的箭总是从没人预料的角落飞来，敌人倒下时还在纳闷：她刚才明明还站在那块石头后面啊？",
 atk:65,hp:60,spd:92,def:28,skl:62,
 lore:`<p><span class="hl-gold">边际森林</span>深处，若有一声轻快的口哨伴着一抹绿意掠过枝头，那多半就是<span class="hl-cyan">娜莉亚</span>来了。她是这片森林最敏锐的眼睛，人们叫她<span class="hl-gold">“翠羽”</span>。</p>
 <p>她生在边际森林腹地被古橡树环抱的“听风之境”，那是个万物有灵的地方。故乡的草木教会了她两件事：如何呼吸，以及如何消失。翠绿窄帽下是一头如秋日枫火般的红发，和一双能穿透密林迷雾的<span class="hl-cyan">明亮眼睛</span>——那是她在无数个守望的长夜里，与林间星光和晨露悄悄定下的约定，好让她在最深的黑暗中，也能捕捉到敌人最细微的一丝颤动。</p>
 <div class="callout">“美丽往往伴随着致命，而真正的希望，往往就藏在那些最不被察觉的、如落叶般寂静的影子里。”</div>
 <p>她看上去活泼俏皮，带着几分少女的促狭，叫人不自觉地放松警惕——而这正是“翠羽”最致命的地方。她太懂得，在力量悬殊的较量里，“距离”才是猎手最厚的铠甲。交手之前她早已隐入边际森林繁茂的枝叶，等对手放下戒心，才送上那枚淬了森林之毒的“赠礼”。敌人倒下时往往满脸困惑：她明明上一秒还站在那块石头后面，怎么箭却从完全相反的角落飞来？</p>
 <p>让她从轻盈的精灵蜕变成森林利刺的，是那场席卷边际森林的野火。为了护住赖以生存的古木，她第一次独自面对成群的掠夺者，也第一次意识到：光会跑、会躲，是不够的。她得成为森林伸出的那根最锐利的刺。她学会了在箭簇上淬炼草木的汁液，学会了在一呼一吸间与大地融为一体。从那以后，林子里多了一个传说——没人见过娜莉亚从哪里出手，人们只知道，当那一抹翠绿闪过，所有的喧嚣与混乱，都会重归寂静。她独行，却从不冷漠：冬夜里她会为森林里迷路的旅人燃起一簇小火，干旱时她会替焦渴的兽群引来甘泉。如果说塔林是坚固的城墙，那她就是城墙外那阵替所有人预警的风。</p>`},

{f:"pender",cn:"裴丹",title:"魔法射手",nick:"裴丹（魔法射手）",map:"边际森林",
 desc:"没人敢追问裴丹的过去——上一个问的人已经成了她法术与箭术的双料教材。而她只是淡淡看着你：“你身上也有力量。”",
 atk:60,hp:35,spd:98,def:20,skl:88,
 lore:`<p><span class="hl-gold">边际森林</span>边缘那片长夜的荒原上，偶尔会划过一抹晚霞般的橘红。那是<span class="hl-cyan">裴丹</span>，受过她搭救的旅人尊称她为<span class="hl-gold">“破法之光”</span>，亲近些的则像唤邻家姑娘一样喊她“阿丹”。</p>
 <p>她的来历是一卷被焚毁的残章。没人知道她从何而来，少数几个曾窥见过她过往的人，也早已在岁月里归于沉寂。所以没人敢追问她的过去——据说上一个开口问的人，最后成了她法术与箭术的“双料教材”。她那一袭缀着金边的橘红长袍、嵌着湛蓝宝石的缠头巾，仿佛封存着另一个早已湮灭的文明的余温。</p>
 <div class="callout">“真正的力量，从来不是厚重的甲胄，而是那双澄澈眼眸中，对真理永不熄灭的追寻。”</div>
 <p>她清冷、锐利，对虚名毫不在意，却对“天赋”有着近乎偏执的直觉。她常独自游荡在边际森林的边缘，会在熙攘的人群中忽然驻足，只因在某个不起眼的人身上，瞥见了足以撼动未来的火种。然后她会走过去，淡淡地看着对方说一句：“你身上，也有力量。”——许多日后名震一方的英雄，都是从这句话开始，被她推着走上了自己的路。</p>
 <p>她的身躯单薄得像秋日的落叶，仿佛一阵风就能吹倒，可在魔力的国度里，她是无可争议的君王。她惯用一柄镶着蓝宝石的<span class="hl-cyan">法杖</span>，杖尖一引，便能在电光石火间改写魔力的流向：当旁人的咒语还困在漫长的吟唱里，她已抹去了法术之间所有的间隙，让毁灭如连珠般倾泻而下。她口中低吟着古老的咒文，指尖与杖身共鸣，一道道<span class="hl-red">雷光</span>便顺着杖尖激射而出，在荒原上撕开刺目的弧线。她独来独往，却从未真正远离这个世界——她会为护住一个素未谋面、却“有潜力”的后辈而耗尽心力。在那副拒人千里的冷漠之下，藏着的其实是一种近乎宿命的温柔：她在每一个年轻的灵魂里寻找光，然后，把自己活成那道点燃他们的雷光。</p>`},

{f:"arryn",cn:"艾琳",title:"暖心盾卫",nick:"艾琳（暖心盾卫）",map:"边际森林",
 desc:"艾琳会给你递水、包扎伤口、分享干粮——直到你伸手碰他的战利品，然后你就会发现他的刀比他的盾快多了。",
 atk:75,hp:85,spd:50,def:82,skl:55,
 lore:`<p>在<span class="hl-gold">边际森林</span>的营地里，如果说塔林是挡在最前方的磐石，那<span class="hl-cyan">艾琳·石壁</span>就是能让所有人紧绷的神经松弛下来的那束暖阳。营地里的年轻人都爱亲昵地喊他<span class="hl-gold">“阿琳”</span>，又叫他<span class="hl-gold">“暖心盾卫”</span>。</p>
 <p>他不是从冰冷的军事要塞里走出来的，而是来自南方一个终年泡在阳光里的石匠部落。那里的人相信，石头不只有硬度，还有温度。他那身灿烂如深秋麦穗的金棕色铠甲，便是在那样温暖的炉火边淬炼成的。他有一双看透世间纷杂的沉静眼睛，和一颗见不得别人受苦的心——只要有人需要,他从不吝啬伸出手。</p>
 <div class="callout">“善良不代表软弱，守护亦需要利刃。只要你心怀正道，他便是你背后最温暖的靠山。”</div>
 <p>平日里的他,是边际森林营地最温厚的大哥。他给新兵缝补磨破的战袍，在林间的冬夜里端来一碗碗热汤，他的笑容能把战场的阴霾一扫而空，让人暂时忘了死亡的恐惧。可这份极致的温柔下，藏着一条谁也碰不得的底线。他会给你递水、替你包扎、分你干粮，可一旦你伸手去碰他守护的“宝藏”，你就会瞬间见识到——他的刀，比他的盾快多了。当他紧握长剑发出震慑心魄的<span class="hl-red">咆哮</span>，连最贪婪的强盗也会两腿发软。</p>
 <p>这条底线，是从一场失去里长出来的。年轻时，他贴身收着一枚刻有母亲名字的石坠，却在一次混乱的洗劫中弄丢了。从那以后他懂得了一个道理：真正的强大，不只是能慷慨地“给予”，更是要有能力“握紧”——握紧那些再也不能失去的东西。所以他赤着双脚踏在森林的土地上，为的是更清楚地感应大地的脉搏，也为的是在任何人需要他的瞬间，能立刻发力冲过去。他递得出最暖的水，也亮得出最快的刀,这恰恰是同一颗心的两面：温柔，是因为有想护住的人;锋利，也是因为有想护住的人。</p>`},

{f:"nalfar",cn:"纳凡",title:"骨语者",nick:"纳凡（骨语者）",map:"安息云峰",
 desc:"纳凡的骷髅卫兵眼眶空洞，他却坚持说那眼神和哈士奇一样惹人怜爱。“你们不觉得它们的颅骨曲线很优美吗？”",
 atk:45,hp:65,spd:60,def:45,skl:85,
 lore:`<p><span class="hl-gold">安息云峰</span>上那些云雾缭绕、繁花掩映的静谧墓园中，常坐着一位银发如瀑、肤色泛着幽蓝的青年巫师。他叫<span class="hl-cyan">纳凡·葬魂</span>，伙伴们唤他“阿凡”，世人则叫他<span class="hl-gold">“骨语者”</span>。</p>
 <p>他出身一支与阴影结盟的暗精灵部落，在那个古老的族群里，死亡不是终点，而是一场通往永恒宁静的远行——而安息云峰，正是无数灵魂最终安睡的归处，也因此成了他流连忘返的地方。别的孩子在林间追逐风的方向时，少年纳凡却更愿意安静地坐在云峰古老的石棺旁，和那些被岁月磨得洁白如玉的骸骨无声交谈。在他眼里，每一具白骨都不是冰冷的躯壳，而是一段不该被遗忘的、曾经鲜活的人生。</p>
 <div class="callout">“死亡并非真正的终结，只要这世间还有一人记得那份可爱的微光，灵魂便永不荒芜。”</div>
 <p>世人觉得他怪。他召唤的骷髅卫兵眼眶空洞、面目森然，他却一本正经地觉得那眼神“和哈士奇一样惹人怜爱”，还会歪着头认真问你：“你们不觉得它们的颅骨曲线，很优美吗？”这份在偏见中独自盛开的奇特审美，给了他一种旁人难以理解的松弛与温柔——他以近乎慈爱的耐心，照料着安息云峰这些被全世界遗弃的残缺记忆。</p>
 <p>他的战斗，是一场关于“契约”的告解。他从不把骸骨伙伴当成廉价的消耗品，他施展的核心秘术叫<span class="hl-cyan">“魂链相依”</span>——把自己的生命韵律与伙伴紧紧缠绕，在生死的边缘维系着脆弱却强大的平衡。会变成这样，源于多年前那场席卷部落的疫病。为了留住那些濒临消亡的鲜活生命，他第一次违背了族里“顺应自然”的古训，甘愿献出自己的一部分生机，去唤醒云峰之上古老死灵的庇护。那场以血肉与灵魂为代价的祭典之后，他原本洁白胜雪的肌肤，从指尖开始，一寸寸沁出幽幽的蓝——那是死灵之力在他血脉里流淌过的印记，像把整片安息云峰夜空的寒色都揉进了皮肤。从那以后，他的身躯一半属于生者，一半连着亡灵的国度，也因此拥有了在绝境中将混乱之力化为治愈之火的能力。每当那抹蓝在战场上亮起，倒下的伙伴便会重新睁眼。他终于参透了一件事：唯有真正敬畏生命的人，才懂得如何温柔地拥抱死亡——哪怕代价是让死亡的颜色，永远地染上自己的身体。</p>`},

{f:"illia",cn:"伊莉亚",title:"铁兰花",nick:"伊莉亚（铁兰花）",map:"边际森林",
 desc:"伊莉亚把铁匠铺的炉火和愤怒一起锻进盾剑，单枪匹马闯进食人魔营地——那天食人魔第一次知道什么叫铁花盛开。",
 atk:85,hp:90,spd:45,def:88,skl:60,
 lore:`<p>在<span class="hl-gold">边际森林</span>边缘那座炉火彻夜不熄的铁匠铺里，飞溅的火星和沉重的锤击声中，长出了一位把铁血与柔情锻在一起的奇女子。她是<span class="hl-cyan">伊莉亚·盾铸</span>，亲眼见过她单枪匹马闯魔窟的镇民，唤她<span class="hl-gold">“铁兰花”</span>——意志硬如钢铁，初心柔似兰草。</p>
 <p>她的童年是橘红色的。当别的女孩摆弄红妆时，她正吃力地拉着风箱，看赤红的铁汁在模具里流淌。把她带大的叔叔不只教她驯服坚硬的金属，更把“守护”二字一锤一锤打进了她的灵魂。对她来说，每一块生铁的鸣响，都是故乡最安稳的心跳。</p>
 <div class="callout">“真正的强大并非生而为王，而是在面对失去时，能亲手为自己锻造出一副抵御风霜的铠甲。”</div>
 <p>命运的铁锤却毫无征兆地砸了下来。食人魔大军从边际森林深处涌出，如潮水般卷过村庄，掳走了她最亲的叔叔。那个只会递铁钳的女孩，在那一刻消失了。悲痛没有击垮她，反而成了淬火的冷水，让她瞬间清醒、瞬间坚硬。她独自跨进那座空荡荡的铁匠铺，七天七夜不眠不休，用满手的血泡和汗水，为自己打出了一整套盾剑护甲。当她披挂着走出火光时，已不再是学徒，而是为血脉至亲向黑暗宣战的勇士。那一仗，她孤身杀进森林深处的食人魔营地救回了叔叔，也让食人魔头一回明白，什么叫“铁花盛开”。</p>
 <p>历过千锤百炼的她，沉稳得不轻易开口，却总在危机来临时第一个挡在所有人身前。她不擅长莽撞的猛攻，而精于一种极具美感的“防守反击”：手中的盾能撑起一道不破的<span class="hl-cyan">流光屏障</span>，护住身后所有人;敌人的重击砸在盾上，常常化作反噬自身的力道弹回去;而当她真正发力，大地会随她的重踏震颤，那股排山倒海的<span class="hl-red">推力</span>能把一切邪恶推出门外。站在她的背影后，每一个战友都能尝到一种叫“安心”的、几乎要把人淹没的踏实。</p>`},

{f:"usara",cn:"尤萨拉",title:"幻法导师",nick:"尤萨拉（幻法导师）",map:"安息云峰",
 desc:"尤萨拉的法杖比门板还宽，她的咒语能让重力迷路、时间打结、欧曼乖乖低头喊她“大师”。没人知道她来自哪个世界。",
 atk:85,hp:60,spd:30,def:50,skl:98,
 lore:`<p>群星之外，连时间都会停滞的虚无深处，走出过一位背负着位面秩序的漫游者。她是<span class="hl-cyan">尤萨拉·星巡</span>，比起“大师级巫师”这个带着距离感的头衔，受过她点拨的年轻人更爱唤她<span class="hl-gold">“阿萨”</span>，或<span class="hl-gold">“幻法导师”</span>。</p>
 <p>她不是这片土地的原住民。她来自一个被古老魔法笼罩、现实与幻梦边界模糊的未知世界，跨越无尽星海来到此地，落脚之处正是离星空最近的<span class="hl-gold">安息云峰</span>。那身湛蓝与金棕相间的法袍里，封存着她故乡最后一缕星光的余温——没人知道那个世界叫什么，也没人知道,她还能不能回去。</p>
 <div class="callout">“真正的强大，不是统治，而是当万物陷入混沌时，你能温柔地握住世界的手，告诉它——希望一直都在。”</div>
 <p>她的举止常显得古怪而深奥，话里带着不属于这个时代的智慧。她不迷恋纯粹的破坏，反倒痴迷于用那些令人困惑的奇诡魔法改写战局。当她在安息云峰的云海间挥起那柄几乎与她等高、比门板还宽的巨大战斗法杖，现实的规律便随之扭曲：她能随手施展逆转强弱的<span class="hl-cyan">能量互换</span>，让不可一世的强敌瞬间虚弱，让精疲力竭的战友重焕生机。连一向自负的师弟欧曼，在她面前也得乖乖低头喊一声“大师”。</p>
 <p>真正让人记住她的，是她初到这个世界、刚降落在安息云峰脚下的那一幕。一群被邪祟侵蚀的生灵围攻一座山下的村落，眼看就要血流成河，是尤萨拉站了出来。她没有降下毁灭性的雷霆——那样太容易，也太冷酷。她只是张开一个巨大的<span class="hl-cyan">磁能场</span>，在无声中把所有的恶意尽数封锁。那一刻，村民们看见的不是一位高高在上、降罚人间的神明，而是一个在天翻地覆的混乱里，固执地伸出手，要替这个世界重新建起秩序的、温柔的引路人。</p>`},

{f:"ritic",cn:"凌克",title:"影瞳刺客",nick:"凌克（影瞳刺客）",map:"封神冰川",
 desc:"凌克没有过去，没有名字，没有疑问——他被深渊锻造的唯一目的，就是把刀刃送进目标的心脏。",
 atk:90,hp:65,spd:75,def:42,skl:80,
 lore:`<p>极北的<span class="hl-gold">封神冰川</span>最深、最冷的渊薮里，诞生了一抹连光都逃不出去的阴影。他没有过去，没有故乡，连自己的真名都遗忘在了那片永冻的冰土里。人们只知道他叫<span class="hl-cyan">凌克</span>，幸存者们敬畏地称他<span class="hl-gold">“影瞳”</span>。</p>
 <p>他是极致的孤独者。生命里所有的情感与色彩仿佛都被封神冰川的严寒冻得干干净净，只剩一个被深渊烙进骨子里的指令：刺杀。那身在黑暗中泛着冷光的黄金铠甲，不是荣耀的象征，而是用来在虚无里锚定他那几近透明的存在感。金甲之下,是一具完全融进夜色的身躯，唯有一双锐利如鹰隼的眼睛，像冰川上空的孤星，静静俯瞰人间的纷乱。</p>
 <div class="callout">“即便是一个没有过去、没有名字的灵魂，也能在守护他人的过程中，刻下属于自己的、不朽的痕迹。”</div>
 <p>战场上的他是空间法则的亵渎者。他不奔跑，不翻越，他只是“闪烁”——在敌人眨眼的须臾间，他已踏碎现实的缝隙，无声地出现在最脆弱的咽喉之后。他能挥手让浓墨般的黑暗瞬间凝成一道<span class="hl-red">“黑暗之墙”</span>，把战场割成两个孤立的世界，再在墙后开启吞噬光明的暗影涡流，将目标拖进和封神冰川一样冰冷的深渊。</p>
 <p>他一直以为自己只是一件冷酷的杀器，直到一次在封神冰川执行的暗杀任务中，他对上了一个孩子清澈的眼神。就在那一瞬，他冰封了一生的内心，裂开了一道极细的缝。他忽然意识到，在这个满目疮痍的世界里,刀刃不只能用来毁灭，也可以用来守护。从那以后，他默默替安雅清理侧翼的暗哨，在塔林防线裂开缺口的刹那闪现过去补上致命一击。他和伙伴们之间从无半句交谈，可那种“我的影子里，一直有你”的默契，比任何说出口的誓言都要厚重。一个没有名字的灵魂，终究还是在守护别人的过程里，为自己刻下了一个名字。</p>`},

{f:"okar",cn:"欧卡",title:"撼地者",nick:"欧卡（撼地者）",map:"安息云峰",
 desc:"欧卡踩死过队友、压扁过营地、震塌过桥梁，被流放后他只想找个不怕被他一屁股坐扁的对手。",
 atk:98,hp:98,spd:15,def:90,skl:50,
 lore:`<p><span class="hl-gold">安息云峰</span>的地平线上，有时会缓缓挪来一座“孤峰”。他每迈一步，方圆百里的生灵都能感到大地那沉重而规律的震颤。他是<span class="hl-cyan">欧卡·踏地</span>，一个被巨人族放逐、却在凡人世界里寻找归宿的异类，流民们亲切地唤他“老欧”，又敬畏地叫他<span class="hl-gold">“撼地者”</span>。</p>
 <p>他出生在安息云峰之巅古老的巨灵山脉，即便在以伟岸著称的同族里，他的体型也大得突兀。同伴们身手敏捷地在云端捕猎时，他的动作却总是迟缓、笨重，仿佛每一寸肌肉里都压着一座远古的山。这份过剩的力量给了他磐石般无可摧毁的身躯，也让他成了族群里最孤独的那一个。</p>
 <div class="callout">“真正的强大，不是摧毁，而是克制；真正的辉煌，不是立于山巅，而是在被世界流放后，依然愿意用宽阔的脊梁，护住那一片名为‘家园’的微光。”</div>
 <p>他的孤独里藏着一道至今想起仍会心碎的伤口。一次族群在云峰间迁徙途中，他那无法自控的力量与迟缓的反应，酿成了一场无法挽回的悲剧——他踩塌、压垮了本不该伤害的东西。那不是出于恶意，却成了他终身背负的枷锁。族长的判决冰冷而决绝：流放。从此，那个庞大的身影从安息云峰之巅消失，孤零零地走进了山下凡人的领地。他那双眼里，从此多了一抹再也化不开的哀伤。如今的他，只想找一个“不怕被他一屁股坐扁”的对手，找一个不会因为他的力量而离他远去的地方。</p>
 <p>战场上的他是一道令敌人绝望的风景。他不需要花哨的招式，沉重的一踏便能让方圆数丈的地面如波浪般翻涌;他能信手拈起磨盘大的磐石，化作呼啸的流星掷向远方。可你若仔细看，会发现他出拳总是有所保留——他太清楚自己的力量有多可怕，于是把每一击都死死地按住。那份看似笨拙的迟缓背后，其实是一个被力量伤害过的巨人，对这个脆弱世界，所能给出的、最小心翼翼的温柔。</p>`},

{f:"zana",cn:"萨娜",title:"森之灵",nick:"萨娜（森之灵）",map:"安息云峰",
 desc:"萨娜的指尖能催生千年古木，食人魔烧了她的家园，她便让整片森林长成他们的坟场——和平，有时需要用荆棘书写。",
 atk:65,hp:70,spd:85,def:48,skl:90,
 lore:`<p><span class="hl-gold">安息云峰</span>之上万木争荣的云雾秘境里，清风每拂过叶梢，总能惊起一抹轻盈的绿。她是<span class="hl-cyan">萨娜·森之灵</span>，在这片大地流离失所的难民眼中，她是带来希望的<span class="hl-gold">“森之灵”</span>，伙伴们则唤她“阿娜”，像在呼唤林间最清澈的一场晨雨。</p>
 <p>她的前半生本是一首静谧的田园诗。在那个生长于安息云峰高处、被参天古木环抱的家园里，她是自然魔力最虔诚的学徒，指尖轻点便能让枯木抽出新芽。可这份宁静，终结在食人魔点燃的漫天火光里。眼睁睁看着昔日繁茂的故土在烈焰中呻吟、坍塌，她没有沉进绝望，而是把那颗破碎的初心，硬生生熬成了守护的坚壳。</p>
 <div class="callout">“真正的力量不在于摧毁，而在于当世界满目疮痍时，你依然愿意伸出手，去温柔地呵护那一抹微弱的绿意。”</div>
 <p>作为当世顶尖的自然魔法师，她举手投足都带着万物生长的律动。她温婉，却绝不软弱。面对被狂怒蒙了眼的敌人，她会咏唱一首抚慰灵魂的生命之歌，那旋律如细雨润物，能让最暴戾的杀意在瞬间<span class="hl-cyan">消弭</span>;可若遇上执意要毁灭一切的侵略者，她便会降下自然的惩诫——召唤云峰大地深处的根须破土而出，把敌人的野心连同脚步一起<span class="hl-red">麻痹</span>在泥沼里。她常说，和平有时候，是需要用荆棘来书写的。当年烧了她家园的食人魔便领教过：他们烧掉的那片林子，后来在安息云峰上长成了埋葬他们自己的坟场。</p>
 <p>背负着这样的重任，她心底却始终留着一份最质朴的柔软。深夜里，她会悄悄为受伤的小鹿包扎;干旱时，她会把森林珍藏的甘露分给焦渴的士兵。她坚信一个近乎执拗的真理：只要心中那份对生命的眷恋还在跳动，再焦黑的土地，也终会长出名为希望的新芽。萨娜·森之灵，这位在云端废墟上翩然起舞的守护者，用她的一生证明——最深的温柔与最决绝的守护，从来都是同一件事。</p>`},

{f:"valkyrie",cn:"星璃",title:"女武神",nick:"星璃（女武神）",map:"封神冰川",
 desc:"父亲说那颗星落进冰川再没出来，她便提着盾上去找。食人魔护法的亡灵淹了九座山头，她站在第十座上面，一步没退。",
 atk:88,hp:90,spd:55,def:90,skl:72,
 lore:`<p>终年积雪的<span class="hl-gold">封神冰川</span>之巅，流传着一个关于盾与星的传说。一位提盾而行的战士，循着一颗坠落的星辰一路向上，再也没有回头。她是<span class="hl-cyan">星璃</span>，人们叫她<span class="hl-gold">“女武神”</span>。</p>
 <p>很小的时候，父亲指着夜空对她说：“你看那颗最亮的星，有一年它落进了封神冰川，就再也没出来过。”别的孩子听过也就忘了，星璃却把这句话刻进了心里。她不明白，为什么一颗那么亮的星，会甘心沉进那片冰冷的深渊里，再不挣扎。后来父亲在一场战祸中走了，连同那句关于星的话，一起留给了她。于是长大后的某一天，她默默背起盾，独自登上了封神冰川那座被诅咒笼罩的雪山——她要去找那颗星，也像是要去找一个,关于“失去到底是不是终点”的答案。</p>
 <div class="callout">“星辰坠落之处，便是我立足之地——纵有亡灵淹没九座山头，第十座，我一步不退。”</div>
 <p>她从不相信失去就是结局，正如她不相信任何高墙能挡住一个足够执着的灵魂。这份近乎倔强的信念，在封神冰川那场雪山之战里被烧到了极致。食人魔护法召唤的亡灵如黑色潮水般涌来，接连吞没了九座冰封的山头，连最勇猛的战士也丢盔弃甲、仓皇溃退。唯有星璃,稳稳地立在第十座冰峰之上。亡灵的悲鸣一次次撞在她的盾上，又一次次碎开;她的脚跟陷进积雪里，却始终没有后移半寸。她不是不知道害怕，她只是比谁都清楚:她身后的第十座山，若是失守，就再没有第十一座可退了。</p>
 <p>对星璃而言，守护从来不是上级递来的一纸命令，而是一场必须由她亲自抵达终点的远征。那颗坠入封神冰川的星，她或许至今仍没找到;可她渐渐懂了——也许那颗星从未真正熄灭,它只是化作了千千万万个,愿意为他人提盾而上、一步不退的人。而她,正是其中之一。她的盾下挡住的不是亡灵的悲鸣，是所有不肯向“失去”低头的勇气。</p>`},

{f:"ned",cn:"田安",title:"锄奸客",nick:"田安（锄奸客）",map:"边际森林",
 desc:"铲是妻过门那年打的。妻走了，铲陪着他。食人魔进村那天，他举铲战斗。后来地里多了几座新坟。铲柄上，长了一穗麦。",
 atk:78,hp:88,spd:35,def:75,skl:42,
 lore:`<p><span class="hl-gold">边际森林</span>边缘那片炊烟与麦浪交织的乡野间，曾住着一位话很少的老农，手里那柄铁铲被岁月磨得发亮。他叫<span class="hl-cyan">田安</span>，村里人唤他<span class="hl-gold">“锄奸客”</span>。他不像个英雄，更像田埂上随处可见的、最普通的一个庄稼人。可恰恰是这样的人，最懂得什么东西值得用命去守。</p>
 <p>那柄铲，是妻子过门那年，他亲手在炉子上一锤一锤打出来的。打它的时候，他想的是往后一辈子在这片森林边的春种秋收，是两个人守着一亩薄田、一屋炊烟,把日子过得踏踏实实。那些年里，铲翻开春天湿润的泥土，妻在田垄上送来一碗温热的粗茶;铲守过秋天金黄的麦场，妻在场院边笑着替他擦去额头的汗。日子清苦，却被两个人过成了边际森林边最暖的一缕烟火。</p>
 <div class="callout">“铲是用来翻土的，也是用来安葬的。哪一种，由来犯的人自己选。”</div>
 <p>食人魔从边际森林深处踏进村子的那天，年轻人慌了，老人哭了，孩子躲了。田安没有说话，只是回头望了一眼身后那间亮着灯的屋子，便从墙角拎起那柄翻了大半辈子土的铲，迎着那些庞然大物走了出去。他不懂什么剑术枪法，他只会一件事——把铲举高，再用尽全身的力气挥下去，就像他春耕时翻开冻土那样，一下，又一下。他护住的，是身后那盏灯，是那个曾在田垄上为他送茶的人，是这片土地上他爱过的全部。那一仗打得很苦，可他没有退，一步也没有。</p>
 <p>后来,村口靠着森林的那块地里多了几座新坟。喧嚣散尽，铁铲被孤零零地遗落在荒了的田里，柄上积起薄薄的尘，再没有人来握紧它。可就在某个清晨，那柄深深插进泥土的铲，柄上竟悄悄抽出了<span class="hl-gold">一穗新麦</span>，在风里轻轻摇晃，金黄得晃眼。村里人说，是这片土地记住了它的守护者——铲是用来翻土的，也是用来安葬的;可它最终长出来的，是麦子,是新的春天,是这片饱经磨难的土地，给所有以命相护的人，最沉默也最温柔的回答。</p>`},
];



/* ===== 图片资源 CDN 前缀 ===== */
const CDN = "https://assets.koudashijie.com/heroes/";

/* ===== 雷达图维度配置 ===== */
const dims=[
  {k:'atk',label:'伤害',color:'var(--red)'},
  {k:'skl',label:'技能',color:'var(--purple)'},
  {k:'spd',label:'速度',color:'var(--blue)'},
  {k:'def',label:'防御',color:'var(--cyan)'},
  {k:'hp', label:'生命',color:'var(--green)'},
];
const N=dims.length, R=72;

const svg=document.getElementById('radar');
function ptOnAxis(i,r){
  const ang=-Math.PI/2 + i*2*Math.PI/N;
  return [Math.cos(ang)*r, Math.sin(ang)*r];
}
(function buildGrid(){
  let html='';
  [0.25,0.5,0.75,1].forEach(s=>{
    const pts=dims.map((_,i)=>ptOnAxis(i,R*s).join(',')).join(' ');
    html+=`<polygon points="${pts}" fill="none" stroke="rgba(244,199,82,0.13)" stroke-width="1"/>`;
  });
  dims.forEach((d,i)=>{
    const [x,y]=ptOnAxis(i,R);
    html+=`<line x1="0" y1="0" x2="${x}" y2="${y}" stroke="rgba(244,199,82,0.18)" stroke-width="1"/>`;
    const [lx,ly]=ptOnAxis(i,R+20);
    html+=`<text class="radar-label" x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle">${d.label}</text>`;
  });
  html+=`<polygon id="radarFill" points="" fill="rgba(244,199,82,0.22)" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round" style="transition:all .6s ease"/>`;
  html+=`<g id="radarDots"></g>`;
  svg.innerHTML=html;
})();

const rail=document.getElementById('rail');
const bgImg=document.getElementById('bgImg');
const posterImg=document.getElementById('posterImg');
const infoAnim=document.getElementById('infoAnim');
let cur=-1;

function setRadar(h){
  const pts=dims.map((d,i)=>ptOnAxis(i, R*h[d.k]/100).join(',')).join(' ');
  document.getElementById('radarFill').setAttribute('points',pts);
  let dots='';
  dims.forEach((d,i)=>{
    const [x,y]=ptOnAxis(i, R*h[d.k]/100);
    dots+=`<circle cx="${x}" cy="${y}" r="3" fill="${d.color}" stroke="#1a1208" stroke-width="1"/>`;
  });
  document.getElementById('radarDots').innerHTML=dots;
  document.getElementById('legend').innerHTML=dims.map(d=>
    `<div><span style="color:${d.color}">● ${d.label}</span><b>${h[d.k]}</b></div>`).join('');
}

function render(i){
  if(i===cur) return;
  cur=i;
  const h=heroes[i];
  document.querySelectorAll('.avatar').forEach((a,idx)=>a.classList.toggle('active',idx===i));
  bgImg.classList.remove('show');
  posterImg.classList.remove('show');
  infoAnim.classList.remove('in');
  setTimeout(()=>{
    bgImg.src=CDN+h.f+'_b.png';     /* 背景图改为 CDN 链接 */
    posterImg.src=CDN+h.f+'.png';   /* 海报图改为 CDN 链接 */
    bgImg.onload=()=>bgImg.classList.add('show');
    posterImg.onload=()=>posterImg.classList.add('show');
    document.getElementById('hCn').textContent=h.title;
    document.getElementById('hName').textContent=h.cn;
    document.getElementById('hSlogan').textContent=h.desc;
    setRadar(h);
    requestAnimationFrame(()=>infoAnim.classList.add('in'));
  },180);
  document.getElementById('cNow').textContent=String(i+1).padStart(2,'0');
}

heroes.forEach((h,i)=>{
  const a=document.createElement('div');
  a.className='avatar';
  a.style.backgroundImage=`url(${CDN}${h.f}_a.png)`;   /* 头像改为 CDN 链接 */
  a.title=h.cn;
  a.onclick=()=>render(i);
  rail.appendChild(a);
});
document.getElementById('cAll').textContent=String(heroes.length).padStart(2,'0');

const mask=document.getElementById('storyMask');
const panel=document.getElementById('storyPanel');
function openStory(){
  const h=heroes[cur];
  document.getElementById('sName').textContent=h.cn;
  document.getElementById('sNick').textContent=h.title;   /* nick 改为 title */
  document.getElementById('sBody').innerHTML=h.lore;
  document.getElementById('sBody').scrollTop=0;
  mask.classList.add('open');panel.classList.add('open');
}
function closeStory(){mask.classList.remove('open');panel.classList.remove('open');}
document.getElementById('openStory').onclick=openStory;
document.getElementById('closeStory').onclick=closeStory;
mask.onclick=closeStory;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeStory();});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){render(Math.min(cur+1,heroes.length-1));}
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){render(Math.max(cur-1,0));}
});

render(0);
</script>
</body>
</html>
